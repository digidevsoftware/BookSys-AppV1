<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Shift Management System</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: page(~{::section})}">
    <section>
        <div class="page-header">
            <div>
                <h1>Dashboard</h1>
                <p class="muted">A simple overview of your Version 1 shift management app.</p>
            </div>
        </div>

        <div class="stats-grid">
            <div class="card stat-card">
                <h2 th:text="${employeeCount}">0</h2>
                <p>Total employees</p>
            </div>
            <div class="card stat-card">
                <h2 th:text="${shiftCount}">0</h2>
                <p>Total shifts</p>
            </div>
        </div>

        <div class="card">
            <div class="page-header small-gap">
                <h2>Upcoming Shifts</h2>
                <a class="button-link" th:href="@{/shifts/schedule}">View full schedule</a>
            </div>
            <div th:if="${#lists.isEmpty(recentShifts)}" class="muted">No shifts added yet.</div>
            <table th:unless="${#lists.isEmpty(recentShifts)}">
                <thead>
                <tr>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Employee</th>
                    <th>Type</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="shift : ${recentShifts}">
                    <td th:text="${shift.date}"></td>
                    <td th:text="${shift.startTime + ' - ' + shift.endTime}"></td>
                    <td th:text="${shift.employee.fullName}"></td>
                    <td th:text="${shift.shiftType}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</div>
</body>
</html>
