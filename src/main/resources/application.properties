spring.application.name=shiftmanagementsystem

# PostgreSQL configuration
# Update these values for your local database setup.
spring.datasource.url=jdbc:postgresql://localhost:5432/shift_management_system
spring.datasource.username=postgres
spring.datasource.password=change_me
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false

# Seeded default admin account
app.seed.admin.username=admin
app.seed.admin.password=Admin123!
